<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Time-Decay Checkpoint Bot</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f6fa;color:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;line-height:1.5}
header{background:#fff;border-bottom:2px solid #e8e8f0;padding:10px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.hrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.logo{font-weight:900;font-size:15px;color:#1a1a2e;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e}
.dot.off{background:#ef4444}
.badge{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px}
.badge.paused{background:#eff6ff;color:#2563eb;border:1px solid #93c5fd}
.badge.live{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.badge.up{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
.badge.dn{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.stats{display:flex;gap:5px;flex-wrap:wrap}
.stat{background:#f8f9fe;border:1px solid #e8e8f0;border-radius:8px;padding:4px 10px;text-align:center;min-width:70px}
.stat .sl{font-size:8px;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.stat .sv{font-size:13px;font-weight:800}
.g{color:#16a34a}.r{color:#dc2626}.y{color:#d97706}.b{color:#2563eb}.w{color:#1a1a2e}.gr{color:#6b7280}
main{padding:10px;max-width:1000px;margin:0 auto}
.card{background:#fff;border:1px solid #e8e8f0;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.card-title{font-size:9px;font-weight:800;margin-bottom:10px;text-transform:uppercase;color:#6b7280;letter-spacing:.6px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f1f1f8;padding-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;color:#6b7280;font-size:8px;text-transform:uppercase;padding:4px 3px;border-bottom:1px solid #f1f1f8;font-weight:700;letter-spacing:.4px}
td{padding:4px 3px;border-bottom:1px solid #f8f9fe;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
.empty{text-align:center;padding:30px;color:#9ca3af;font-size:13px}
.log-line{padding:2px 0;border-bottom:1px solid #f8f9fe;font-size:10px;font-family:monospace;color:#374151}
footer{text-align:center;padding:10px;color:#9ca3af;font-size:9px;border-top:1px solid #e8e8f0;margin-top:10px}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="logo"><span class="dot off" id="dot"></span>Time-Decay Bot</div>
    <span class="badge paused" id="modeBadge">📋 PAUSED</span>
    <div class="stats" id="headerStats"></div>
    <button id="toggleBtn" onclick="doToggle()" style="padding:4px 10px;font-size:10px;font-weight:700;background:#fff;border:1.5px solid #2563eb;color:#2563eb;border-radius:6px;cursor:pointer;letter-spacing:.4px">🔴 Go Live</button>
  </div>
</header>
<main>
  <div class="grid2">
    <div class="card">
      <div class="card-title">📊 Markets & Checkpoints</div>
      <div id="mktBody"><div class="empty">Waiting for markets...</div></div>
    </div>
    <div class="card">
      <div class="card-title">📈 Open Lots</div>
      <div id="posBody"><div class="empty">No open positions</div></div>
    </div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">📜 Trades</div>
      <div id="tradeBody"><div class="empty">No trades yet</div></div>
    </div>
    <div class="card">
      <div class="card-title">📝 Activity Log</div>
      <div id="logBody"><div class="empty">No activity yet</div></div>
    </div>
  </div>
</main>
<footer id="footer">Time-Decay Bot | loading...</footer>

<script>
var socket=io({transports:['websocket','polling'],reconnection:true,reconnectionDelay:1000});

function f2(v){return typeof v==='number'?v.toFixed(2):'0.00';}
function f4(v){return typeof v==='number'?v.toFixed(4):'0.0000';}
function cls(v){return v>0?'g':v<0?'r':'gr';}
function sgn(v){return v>0?'+':'';}

function render(d){
  if(!d)return;
  document.getElementById('dot').className='dot on';
  
  var mode=document.getElementById('modeBadge');
  var tbtn=document.getElementById('toggleBtn');
  if(d.dryRun){
    mode.textContent="📋 PAUSED";mode.className='badge paused';
    tbtn.textContent='🔴 Go Live';tbtn.style.borderColor='#2563eb';tbtn.style.color='#2563eb';
  }else{
    mode.textContent="🔴 LIVE";mode.className='badge live';
    tbtn.textContent="⏸️ Pause";tbtn.style.borderColor='#16a34a';tbtn.style.color='#16a34a';
  }

  var h='';
  h+='<div class="stat"><div class="sl">Balance</div><div class="sv w">$'+f2(d.balance)+'</div></div>';
  h+='<div class="stat"><div class="sl">Equity</div><div class="sv w">$'+f2(d.openEquity)+'</div></div>';
  h+='<div class="stat"><div class="sl">PnL</div><div class="sv '+cls(d.pnl)+'">'+sgn(d.pnl)+'$'+f2(d.pnl)+'</div></div>';
  h+='<div class="stat"><div class="sl">Lots</div><div class="sv b">'+(d.openLotCount||0)+'</div></div>';
  h+='<div class="stat"><div class="sl">Markets</div><div class="sv g">'+(d.activeMarkets||0)+'</div></div>';
  h+='<div class="stat"><div class="sl">Fees</div><div class="sv gr">$'+f4(d.totalFees)+'</div></div>';
  document.getElementById('headerStats').innerHTML=h;

  // Markets
  var mc='';
  if(!d.allMarkets||!d.allMarkets.length){mc='<div class="empty">No active markets</div>';}
  else{
    mc+='<table><tr><th>Pair</th><th>Elapsed</th><th>CP</th><th>UP</th><th>DN</th><th>Spread</th><th>Fair ↑</th><th>Fair ↓</th><th>Lots</th><th>Status</th></tr>';
    for(var m of d.allMarkets){
      var domCls=m.dominantSide==='UP'?'g':'r';
      mc+='<tr><td>'+m.label+'</td><td>'+m.elapsed+'</td><td>'+m.checkpoint+'</td>'+
        '<td class="g">$'+f4(m.upMid)+'</td><td class="r">$'+f4(m.dnMid)+'</td>'+
        '<td class="b">'+f4(m.spread)+'</td>'+
        '<td class="'+domCls+'">$'+f4(m.fairDominant)+'</td>'+
        '<td class="gr">$'+f4(m.fairLagging)+'</td>'+
        '<td class="b">'+(m.lots||0)+'</td>'+
        '<td>'+(m.stopped?'⛔':m.active?'✅':'❌')+'</td></tr>';
    }
    mc+='</table>';
  }
  document.getElementById('mktBody').innerHTML=mc;

  // Open positions
  var pc='';
  if(!d.openPositions||!d.openPositions.length){pc='<div class="empty">No open positions</div>';}
  else{
    pc+='<table><tr><th>Pair</th><th>Side</th><th>Lot</th><th>Entry</th><th>Current</th><th>Shares</th><th>Cost</th><th>Value</th><th>Unreal</th><th>CPs</th></tr>';
    for(var p of d.openPositions){
      var sideCls=p.side==='UP'?'up':'dn';
      pc+='<tr><td>'+p.pair+'</td><td><span class="badge '+sideCls+'">'+p.side+'</span></td>'+
        '<td class="gr">#'+p.lotId+'</td>'+
        '<td>$'+f4(p.entryPrice)+'</td><td>$'+f4(p.currentPrice)+'</td>'+
        '<td>'+p.shares+'</td><td>$'+f2(p.cost)+'</td><td>$'+f2(p.currentValue)+'</td>'+
        '<td class="'+cls(p.unrealizedPnl)+'">'+sgn(p.unrealizedPnl)+'$'+f2(p.unrealizedPnl)+'</td>'+
        '<td>'+(p.checkpointsHeld||0)+'</td></tr>';
    }
    pc+='</table>';
  }
  document.getElementById('posBody').innerHTML=pc;

  // Trades
  var tc='';
  if(!d.recentTrades||!d.recentTrades.length){tc='<div class="empty">No trades yet</div>';}
  else{
    tc+='<table><tr><th>Time</th><th>Pair</th><th>Side</th><th>Action</th><th>Entry</th><th>Exit</th><th>Shares</th><th>PnL</th><th>Bal</th><th>Reason</th></tr>';
    for(var t of d.recentTrades){
      tc+='<tr><td>'+t.ts+'</td><td>'+t.pair+'</td>'+
        '<td><span class="badge '+(t.side==='UP'?'up':'dn')+'">'+t.side+'</span></td>'+
        '<td>'+(t.action||'')+'</td>'+
        '<td>$'+f4(t.entry)+'</td><td>$'+f4(t.exit)+'</td>'+
        '<td>'+t.shares+'</td><td class="'+cls(t.pnl)+'">'+sgn(t.pnl)+'$'+f2(t.pnl)+'</td>'+
        '<td>$'+f2(t.bal)+'</td><td class="gr">'+(t.reason||'')+'</td></tr>';
    }
    tc+='</table>';
  }
  document.getElementById('tradeBody').innerHTML=tc;

  // Activity log
  var lc='';
  var logs=d.activityLog||[];
  if(!logs.length){lc='<div class="empty">No activity yet</div>';}
  else{for(var i=0;i<Math.min(logs.length,40);i++){lc+='<div class="log-line">'+logs[i].replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';}}
  document.getElementById('logBody').innerHTML=lc;

  var up=d.uptime||0;
  var upStr=up>3600?Math.floor(up/3600)+'h '+Math.floor((up%3600)/60)+'m':up>60?Math.floor(up/60)+'m '+(up%60)+'s':up+'s';
  var cfg=d.config||{};
  document.getElementById('footer').textContent='Time-Decay Bot | '+(d.targetPairs||[]).join(',')+
    ' | '+cfg.windowSecs+'s windows | '+cfg.checkpointSecs+'s CP | '+cfg.sharesPerLot+'sh/lot'+
    ' | stop:'+cfg.stopElapsed+'s | fee:'+(cfg.takerFee*100)+'bps | uptime: '+upStr+' | ticks: '+(d.tickCount||0);
}

socket.on('connect',    function(){document.getElementById('dot').className='dot on';});
socket.on('disconnect', function(){document.getElementById('dot').className='dot off';});
socket.on('snapshot',   function(d){if(d)render(d);});

setInterval(function(){
  fetch('/api/snapshot').then(function(r){return r.json();}).then(function(d){if(d)render(d);}).catch(function(){});
}, 5000);

function doToggle(){
  var isLive=document.getElementById('modeBadge').className.indexOf('live')>=0;
  var msg=isLive?'Switch to PAUSED? (monitoring only, no orders)':'Switch to LIVE TRADING? Real orders on Polymarket!';
  if(!confirm(msg))return;
  fetch('/api/set-dry-run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dryRun:isLive})})
    .then(function(r){return r.json();})
    .then(function(j){if(j.error)alert('Toggle failed: '+j.error);})
    .catch(function(e){alert('Toggle failed: '+e.message);});
}
</script>
</body>
</html>
