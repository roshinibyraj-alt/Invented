<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BTC Trail Bot</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8f9fe;color:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;line-height:1.5}
header{background:#fff;border-bottom:2px solid #eef0f5;padding:10px 14px;position:sticky;top:0;z-index:100}
.hrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.logo{font-weight:900;font-size:15px;color:#1a1a2e}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.dot.on{background:#22c55e}.dot.off{background:#ef4444}
.badge{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700}
.badge.live{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.badge.demo{background:#eff6ff;color:#2563eb;border:1px solid #93c5fd}
.stats{display:flex;gap:5px;flex-wrap:wrap}
.stat{background:#f8f9fe;border:1px solid #eef0f5;border-radius:8px;padding:4px 10px;text-align:center;min-width:60px}
.stat .sl{font-size:8px;color:#6b7280;text-transform:uppercase;font-weight:600}
.stat .sv{font-size:13px;font-weight:800}
.g{color:#16a34a}.r{color:#dc2626}.y{color:#d97706}.b{color:#2563eb}.w{color:#1a1a2e}.gr{color:#6b7280}
main{padding:10px;max-width:800px;margin:0 auto}
.card{background:#fff;border:1px solid #eef0f5;border-radius:10px;padding:12px;margin-bottom:10px}
.card-title{font-size:9px;font-weight:800;margin-bottom:8px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid #f3f4f8;padding-bottom:6px}
.prices{display:flex;gap:20px;justify-content:center;padding:8px 0}
.price-box{text-align:center;min-width:100px}
.price-label{font-size:9px;text-transform:uppercase;color:#6b7280;font-weight:700;letter-spacing:.5px}
.price-val{font-size:28px;font-weight:900;line-height:1.2}
.price-up{color:#16a34a}.price-dn{color:#dc2626}
.pos-badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.pos-up{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
.pos-down{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.pos-none{background:#f3f4f8;color:#6b7280;border:1px solid #d1d5db}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-item{background:#f8f9fe;border:1px solid #eef0f5;border-radius:6px;padding:6px 8px}
.info-item .lb{font-size:8px;text-transform:uppercase;color:#6b7280;font-weight:600}
.info-item .vl{font-size:14px;font-weight:700;margin-top:1px}
.phase-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:6px 0}
.phase-bar .seg{flex:1}
.phase-bar .trade{background:#22c55e}
.phase-bar .tp{background:#f59e0b}
.phase-bar .force{background:#ef4444}
.trade-line{padding:4px 0;border-bottom:1px solid #f3f4f8;font-size:10px;font-family:monospace;display:flex;gap:6px;align-items:center}
.trade-line:last-child{border-bottom:none}
.log-line{padding:2px 0;font-size:10px;font-family:monospace;color:#374151;border-bottom:1px solid #f3f4f8}
.log-line:last-child{border-bottom:none}
footer{text-align:center;padding:10px;color:#9ca3af;font-size:9px;border-top:1px solid #eef0f5;margin-top:10px}
.empty{color:#9ca3af;font-size:12px;padding:8px;text-align:center}
.btn{padding:4px 10px;font-size:10px;font-weight:700;background:#fff;border:1.5px solid #2563eb;color:#2563eb;border-radius:6px;cursor:pointer}
@media(max-width:600px){.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="logo"><span class="dot off" id="dot"></span>BTC Trail</div>
    <span class="badge demo" id="modeBadge">DEMO</span>
    <div class="stats" id="headerStats"></div>
    <button class="btn" id="toggleBtn" onclick="doToggle()">Toggle</button>
  </div>
</header>
<main>
  <div class="card">
    <div class="card-title">BTC 5m Window <span id="timeInfo" style="font-weight:400;text-transform:none;font-size:10px">loading...</span></div>
    <div id="marketBody"><div class="empty">Waiting for window...</div></div>
  </div>
  <div class="card">
    <div class="card-title">Position</div>
    <div id="positionBody"><div class="empty">No position</div></div>
  </div>
  <div class="card">
    <div class="card-title">Trades</div>
    <div id="tradeBody"><div class="empty">No trades yet</div></div>
  </div>
  <div class="card">
    <div class="card-title">Log</div>
    <div id="logBody"><div class="empty">No activity</div></div>
  </div>
</main>
<footer id="footer">BTC Trail Flip | loading...</footer>

<script>
var socket = io({transports:['websocket','polling'],reconnection:true,reconnectionDelay:1000});
function f2(v){return typeof v==='number'?v.toFixed(2):'0.00';}
function f4(v){return typeof v==='number'?v.toFixed(4):'0.0000';}
function cls(v){return v>0?'g':v<0?'r':'gr';}
function sgn(v){return v>0?'+':'';}
function fmtU(s){if(!s)return'0s';return s>3600?Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m':s>60?Math.floor(s/60)+'m '+(s%60)+'s':s+'s';}

function render(d){
  if(!d)return;
  var b=d.bot||{};
  document.getElementById('dot').className='dot on';

  var h='';
  h+='<div class="stat"><div class="sl">Balance</div><div class="sv w">$'+f2(b.balance)+'</div></div>';
  h+='<div class="stat"><div class="sl">PnL</div><div class="sv '+cls(b.pnl)+'">'+sgn(b.pnl)+'$'+f2(b.pnl)+'</div></div>';
  h+='<div class="stat"><div class="sl">Uptime</div><div class="sv gr">'+fmtU(b.uptime)+'</div></div>';
  document.getElementById('headerStats').innerHTML=h;

  var mode=document.getElementById('modeBadge');
  if(b.dryRun){mode.textContent='DEMO $'+f2(b.balance);mode.className='badge demo';}
  else{mode.textContent='LIVE';mode.className='badge live';}

  var mkts=b.activeMarkets||[];
  if(!mkts.length){
    document.getElementById('marketBody').innerHTML='<div class="empty">No active window</div>';
    document.getElementById('positionBody').innerHTML='<div class="empty">No position</div>';
  } else {
    var m=mkts[0];
    document.getElementById('timeInfo').textContent=m.secsLeft+'s left (elapsed '+m.elapsed+'s)';

    var phaseName='TRADING';
    var phaseCls='';
    if(m.phase==='tp_phase'){phaseName='TP PHASE';phaseCls='color:#f59e0b';}
    else if(m.phase==='force_sell'){phaseName='FORCE SELL';phaseCls='color:#ef4444';}

    document.getElementById('marketBody').innerHTML=
      '<div class="phase-bar">'+
        '<div class="seg trade" style="flex:'+Math.min(m.elapsed,280)+'"></div>'+
        '<div class="seg tp" style="flex:'+Math.max(0,Math.min(m.elapsed-280,15))+'"></div>'+
        '<div class="seg force" style="flex:'+Math.max(0,m.elapsed-295)+'"></div>'+
      '</div>'+
      '<div class="prices">'+
        '<div class="price-box"><div class="price-label">UP</div><div class="price-val price-up">$'+f4(m.upMid)+'</div></div>'+
        '<div class="price-box"><div class="price-label">DOWN</div><div class="price-val price-dn">$'+f4(m.dnMid)+'</div></div>'+
      '</div>'+
      '<div style="text-align:center;font-size:10px;color:#6b7280">Phase: <span style="font-weight:700;'+phaseCls+'">'+phaseName+'</span></div>';

    var pos=m.position||null;
    var posLabel='NONE';
    var posCls='pos-none';
    if(pos==='up'){posLabel='▲ UP';posCls='pos-up';}
    else if(pos==='down'){posLabel='▼ DOWN';posCls='pos-down';}

    document.getElementById('positionBody').innerHTML=
      '<div style="margin-bottom:8px"><span class="pos-badge '+posCls+'">'+posLabel+'</span></div>'+
      '<div class="info-grid">'+
        '<div class="info-item"><div class="lb">Entry</div><div class="vl">'+(m.entryPrice?'$'+f4(m.entryPrice):'-')+'</div></div>'+
        '<div class="info-item"><div class="lb">Shares</div><div class="vl">'+(m.sharesHeld||0)+'</div></div>'+
        '<div class="info-item"><div class="lb">Stop Peak</div><div class="vl">'+(m.stopPeak?'$'+f4(m.stopPeak):'-')+'</div></div>'+
        '<div class="info-item"><div class="lb">Stop Trough</div><div class="vl">'+(m.stopTrough?'$'+f4(m.stopTrough):'-')+'</div></div>'+
      '</div>';
  }

  var tr=b.recentTrades||[];
  var tc='';
  if(!tr.length){tc='<div class="empty">No trades yet</div>';}
  else for(var i=0;i<Math.min(tr.length,30);i++){
    var t=tr[i];
    tc+='<div class="trade-line"><span style="color:#6b7280">'+t.ts+'</span>'+
      '<span style="font-weight:700;color:'+(t.action==='BUY'?'#2563eb':'#d97706')+'">'+t.action+'</span>'+
      '<span class="'+(t.side==='UP'?'g':'r')+'">'+t.side+'</span> @ $'+f4(t.price)+
      (t.pnl?' <span class="'+(t.pnl>=0?'g':'r')+'">'+(t.pnl>0?'+':'')+'$'+f2(t.pnl)+'</span>':'')+'</div>';
  }
  document.getElementById('tradeBody').innerHTML=tc;

  var lg=b.activityLog||[];
  var lc='';
  if(!lg.length){lc='<div class="empty">No activity</div>';}
  else for(var i=0;i<Math.min(lg.length,25);i++){lc+='<div class="log-line">'+lg[i].replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';}
  document.getElementById('logBody').innerHTML=lc;

  var s=b.strategy||{};
  document.getElementById('footer').textContent='BTC Trail | '+s.shares+'sh × $'+f2(s.trailDist)+' trail | TP @'+s.tpPrice+' | '+fmtU(b.uptime);
}

socket.on('connect',function(){document.getElementById('dot').className='dot on';});
socket.on('disconnect',function(){document.getElementById('dot').className='dot off';});
socket.on('snapshot',function(d){if(d)render(d);});
setInterval(function(){
  fetch('/api/snapshot').then(function(r){return r.json();}).then(function(d){if(d)render(d);}).catch(function(){});
}, 3000);

function doToggle(){
  var modeEl=document.getElementById('modeBadge');
  var isLive=modeEl.className.indexOf('live')>=0;
  if(!confirm(isLive?'Switch to DEMO?':'Switch to LIVE?'))return;
  fetch('/api/set-dry-run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dryRun:isLive})})
    .then(function(r){return r.json();}).then(function(j){if(j.error)alert('Fail: '+j.error);}).catch(function(e){alert('Fail: '+e.message);});
}
</script>
</body>
</html>
